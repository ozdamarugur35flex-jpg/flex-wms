<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flex WMS Web</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f8fafc;
        margin: 0;
        padding: 0;
      }
      #error-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: #fff;
        z-index: 9999;
        padding: 2rem;
        color: #e11d48;
        font-family: monospace;
        overflow: auto;
      }
    </style>
    <script>
      // Polyfill for process.env
      window.process = { env: { API_KEY: "" } };
      
      window.onerror = function(msg, url, line, col, error) {
        console.error("Sistem Hatası:", msg);
        const overlay = document.getElementById('error-overlay');
        if (overlay) {
          overlay.style.display = 'block';
          overlay.innerHTML = `
            <div style="max-width: 600px; margin: auto; padding-top: 50px; font-family: sans-serif;">
              <h1 style="font-size: 24px; color: #e11d48; margin-bottom: 20px;">⚠️ Uygulama Başlatılamadı</h1>
              <div style="background: #fff1f2; border: 1px solid #fda4af; padding: 20px; border-radius: 12px; color: #9f1239;">
                <p><strong>Hata:</strong> ${msg}</p>
                <p style="font-size: 11px; margin-top: 10px; opacity: 0.7;">Dosya: ${url} | Satır: ${line}</p>
              </div>
              <button onclick="location.reload()" style="margin-top: 20px; padding: 12px 24px; background: #4f46e5; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">Uygulamayı Yenile</button>
            </div>
          `;
        }
        return false;
      };
    </script>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react-dom": "https://esm.sh/react-dom@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
    "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
    "react-router-dom": "https://esm.sh/react-router-dom@6.22.3?deps=react@18.3.1",
    "lucide-react": "https://esm.sh/lucide-react@0.344.0?deps=react@18.3.1",
    "recharts": "https://esm.sh/recharts@2.12.2?deps=react@18.3.1",
    "xlsx": "https://esm.sh/xlsx@0.18.5",
    "@google/genai": "https://esm.sh/@google/genai@0.3.1",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="error-overlay"></div>
    <div id="root">
      <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; color: #475569; font-family: sans-serif;">
        <div style="width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top-color: #4f46e5; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
        <p style="font-weight: 600; letter-spacing: 0.05em; color: #4f46e5;">FLEX WMS YÜKLENİYOR</p>
      </div>
    </div>
    <script type="module" src="index.tsx"></script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
